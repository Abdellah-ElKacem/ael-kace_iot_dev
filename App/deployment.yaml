apiVersion: v1
kind: Service
metadata:
  name: wil42-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8888
  selector:
    app: wil42
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil42
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wil42
  template:
    metadata:
      labels:
        app: wil42
    spec:
      containers:
        - name: wil42
          image: wil42/playground:v2
          ports:
            - containerPort: 8888